name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server — build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm test

  client:
    name: Client — build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm test

  docker:
    name: Docker — build images
    runs-on: ubuntu-latest
    needs: [server, client]

    steps:
      - uses: actions/checkout@v4

      - name: Build server image
        run: docker build -t trading-server:${{ github.sha }} ./server

      - name: Build client image
        run: docker build -t trading-client:${{ github.sha }} ./client

      - name: Smoke test with Docker Compose
        run: |
          docker compose up -d
          sleep 15
          curl -f http://localhost:3001/health || exit 1
          curl -f http://localhost/api/tickers || exit 1
          docker compose down
